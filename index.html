<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>腹膜透析（洗肚子）認識與體驗｜嘉義基督教醫院 腎臟內科</title>

<!--
═══════════════════════════════════════════════════════════════════
  一份檔案，手機（直/橫式）與電視（橫式）通用。
  ① 置入嘉基影片：程式碼最上面 const VIDEOS = {...}
     vimeo＝國語影片的 Vimeo 編號、vimeo_tw＝台語（選填）。留空("")顯示插槽示意。
     例：vimeo.com/378770445 → 只填數字 "378770445"。
  ② 操作：手機用手指點。電視用遙控器 ▲▼ 移動、數字鍵直選、OK 確認、▶ 下一步。
  ③ CAPD 體驗：五步驟畫面同步顯示「目前到哪一步」，搭配體驗圍裙＋練習藥水。
  ④ 語音：右上角「🔊 朗讀」開啟自動唸；題目卡也有 🔊 重唸（台語建議用院方錄音）。
═══════════════════════════════════════════════════════════════════
-->

<style>
  :root{
    --brand:#CB5A50; --brand-deep:#A8413A; --brand-soft:#FBF1EF; --brand-tint:#F3D7D2;
    --pd:#2A7F74; --pd-soft:#E3F0EE; --hd:#3E6B9E; --hd-soft:#E7EEF6;
    --gold:#B7892F; --gold-soft:#F4ECDB;
    --ink:#2B2622; --muted:#7a726c; --line:#EADCD8; --ok:#2A7F74; --warn:#B5462E; --paper:#fffdfc;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:rgba(203,90,80,.15);}
  html,body{height:100%;}
  body{font-family:"Microsoft JhengHei","Noto Sans TC","PingFang TC",Arial,sans-serif;
    background:var(--brand-soft); color:var(--ink); font-size:18px; line-height:1.65;
    display:flex; flex-direction:column; min-height:100vh; -webkit-text-size-adjust:100%;}
  header{background:var(--brand); color:#fff; padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .brand b{font-size:19px; font-weight:800; display:block;} .brand span{font-size:13px; opacity:.9;}
  .ctrls{display:flex; align-items:center; gap:8px; flex:none;}
  .rbtn{background:rgba(255,255,255,.16); color:#fff; border:1.5px solid rgba(255,255,255,.5);
    border-radius:999px; padding:7px 13px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap;}
  .rbtn.on{background:#fff; color:var(--brand);}
  .lang{display:flex; gap:8px; flex:none;}
  .lang button{background:rgba(255,255,255,.16); color:#fff; border:1.5px solid rgba(255,255,255,.5);
    border-radius:999px; padding:7px 15px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit;}
  .lang button.on{background:#fff; color:var(--brand);}

  .progress{padding:12px 18px 0;}
  .bar{height:10px; background:var(--brand-tint); border-radius:999px; overflow:hidden;}
  .bar i{display:block; height:100%; width:0; background:var(--brand); transition:width .4s ease;}
  .ptext{font-size:13px; color:var(--muted); margin-top:6px;}

  main{flex:1; display:flex; justify-content:center; padding:18px 16px 120px;}
  .stage{width:100%; max-width:640px;}
  .eyebrow{color:var(--brand); font-weight:800; letter-spacing:.06em; font-size:14px;}
  h1{font-size:26px; line-height:1.32; margin:8px 0 6px; font-weight:800;}
  p.lead{font-size:18px; color:#3a352f; margin:10px 0;}

  .video{margin:14px 0; border-radius:16px; overflow:hidden; background:#0e1413;
    aspect-ratio:16/9; position:relative; display:flex; align-items:center; justify-content:center;}
  .video video{width:100%; height:100%; object-fit:contain; background:#000;}
  .vstage{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; color:#eef6f4; text-align:center; padding:20px; background:radial-gradient(120% 90% at 50% 30%,#243b39 0%,#0e1413 70%);}
  .playbtn{width:78px; height:78px; border-radius:50%; background:rgba(255,255,255,.96); color:var(--brand);
    display:flex; align-items:center; justify-content:center; font-size:34px; cursor:pointer; border:none; box-shadow:0 8px 24px rgba(0,0,0,.4);}
  .vstage .label{font-size:18px; font-weight:700;} .vstage small{opacity:.7; font-size:13px;}

  .card{background:var(--paper); border:1.5px solid var(--line); border-radius:16px; padding:18px; margin:12px 0;}
  .q{font-size:21px; font-weight:800; margin-bottom:14px;}
  .qrow{display:flex; align-items:flex-start; gap:10px; margin-bottom:14px;}
  .qrow .q{margin-bottom:0; flex:1;}
  .speak{flex:none; background:var(--brand-tint); color:var(--brand-deep); border:none; border-radius:10px;
    padding:8px 12px; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit; white-space:nowrap;}
  .opts{display:grid; gap:12px;}

  .opt,.chk{font-family:inherit; color:var(--ink); cursor:pointer; background:#fff;
    border:2.5px solid var(--line); border-radius:14px; transition:.12s; width:100%; text-align:left;}
  .opt{display:flex; align-items:center; gap:14px; padding:16px 18px; font-size:19px; min-height:64px;}
  .num{flex:none; width:34px; height:34px; border-radius:9px; background:var(--brand-tint); color:var(--brand-deep);
    font-size:18px; font-weight:800; display:flex; align-items:center; justify-content:center;}
  .opt.sel{border-color:var(--brand); background:#fdeeec;}
  .opt.correct{border-color:var(--ok); background:#e7f3ef;} .opt.correct .num{background:var(--ok); color:#fff;}
  .opt.wrong{border-color:var(--warn); background:#f7e9e4;} .opt.wrong .num{background:var(--warn); color:#fff;}
  .opt .tag{margin-left:auto; font-size:15px; font-weight:800;}
  .opt.correct .tag{color:var(--ok);} .opt.wrong .tag{color:var(--warn);}

  .feedback{margin-top:12px; padding:15px; border-radius:12px; font-size:17px; display:none;}
  .feedback.show{display:block;}
  .feedback.good{background:#e7f3ef; border-left:6px solid var(--ok);}
  .feedback.tip{background:#fdeeec; border-left:6px solid var(--brand);}

  /* 四選項卡 */
  .four{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:14px 0;}
  .ocard{border-radius:16px; padding:16px; border:2.5px solid var(--line); background:#fff;}
  .ocard .h{font-size:19px; font-weight:800; display:flex; align-items:center; gap:8px; margin-bottom:5px;}
  .ocard .h .ico{width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex:none;}
  .ocard p{font-size:15px; color:var(--muted); line-height:1.5;}
  .ocard.pd{border-color:var(--pd);} .ocard.pd .ico{background:var(--pd-soft);}
  .ocard.hd{border-color:var(--hd);} .ocard.hd .ico{background:var(--hd-soft);}
  .ocard.tx{border-color:var(--gold);} .ocard.tx .ico{background:var(--gold-soft);}
  .ocard.cs{border-color:var(--muted);} .ocard.cs .ico{background:#efe9e6;}
  .note{background:var(--pd-soft); border-left:6px solid var(--pd); padding:14px; border-radius:12px; font-size:17px; margin-top:6px;}

  .checklist{display:grid; gap:11px; margin:14px 0;}
  .chk{display:flex; align-items:center; gap:12px; padding:15px 16px; font-size:17px;}
  .chk.sel{border-color:var(--pd); background:var(--pd-soft);}
  .chk .box{width:28px; height:28px; border-radius:7px; border:3px solid var(--brand-tint); flex:none;}
  .chk.sel .box{background:var(--pd); border-color:var(--pd);}

  /* CAPD 步驟追蹤 */
  .tracker{display:flex; gap:7px; flex-wrap:wrap; margin:14px 0;}
  .tchip{flex:1 1 0; min-width:78px; text-align:center; border:2px solid var(--line); border-radius:12px;
    padding:9px 5px; font-size:14px; font-weight:700; color:var(--muted); background:#fff;}
  .tchip .tn{display:flex; width:26px; height:26px; margin:0 auto 4px; border-radius:50%;
    background:var(--brand-tint); color:var(--brand-deep); align-items:center; justify-content:center; font-weight:800;}
  .tchip.active{border-color:var(--pd); background:var(--pd-soft); color:var(--pd);} .tchip.active .tn{background:var(--pd); color:#fff;}
  .tchip.done{border-color:var(--pd); color:var(--pd);} .tchip.done .tn{background:var(--pd); color:#fff;}
  .stepbig{font-size:20px; font-weight:800; color:var(--pd); margin:8px 0 2px;}
  .capd-svg{width:100%; max-width:440px; margin:8px auto; display:block; background:#fff; border:2px solid var(--line); border-radius:16px;}
  .capd-instr{font-size:20px; margin:12px 0; line-height:1.6;}
  .capd-do{background:var(--gold-soft); border-left:6px solid var(--gold); padding:14px; border-radius:12px; font-size:18px; margin:10px 0;}
  .capd-btn{width:100%; font-size:21px; font-weight:800; background:var(--pd); color:#fff; border:none; border-radius:14px; padding:18px; cursor:pointer; font-family:inherit;}

  .kfocus{outline:5px solid var(--brand); outline-offset:3px; box-shadow:0 0 0 8px rgba(203,90,80,.18);}

  .nav{position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1.5px solid var(--line);
    padding:12px 16px; display:flex; align-items:center; gap:12px; padding-bottom:max(12px,env(safe-area-inset-bottom));}
  .keyhint{display:none; flex:1; font-size:15px; color:var(--muted); line-height:1.5;}
  .keyhint kbd{display:inline-block; background:var(--brand-tint); color:var(--brand-deep); border-radius:7px; padding:1px 9px; font-weight:800; font-family:inherit; margin:0 1px;}
  .btn{font-family:inherit; font-size:19px; font-weight:800; border-radius:13px; padding:15px 22px; cursor:pointer; border:none;}
  .btn.primary{background:var(--brand); color:#fff; flex:1;}
  .btn.primary:disabled{background:#e3c4bf; cursor:not-allowed;}
  .btn.ghost{background:#fff; color:var(--muted); border:2px solid var(--line); font-size:16px; padding:14px 16px; flex:none;}

  .summary{background:#fff; border:1.5px solid var(--line); border-radius:18px; overflow:hidden;}
  .summary .head{background:var(--brand); color:#fff; padding:18px 20px;}
  .summary .head b{font-size:21px;} .summary .head span{display:block; font-size:14px; opacity:.9; margin-top:4px;}
  .srow{padding:18px 20px; border-bottom:1.5px solid var(--line);} .srow:last-child{border:none;}
  .srow .k{font-size:15px; color:var(--muted); font-weight:800; letter-spacing:.05em; margin-bottom:8px;}
  .lean{display:inline-block; font-size:20px; font-weight:800; padding:8px 20px; border-radius:999px;}
  .lean.pd{background:var(--pd-soft); color:var(--pd);} .lean.more{background:var(--brand-tint); color:var(--brand-deep);} .lean.other{background:var(--hd-soft); color:var(--hd);}
  .pill{display:inline-block; background:var(--brand-tint); color:var(--brand-deep); border-radius:999px; padding:6px 14px; font-size:16px; font-weight:700; margin:0 6px 8px 0;}
  .gap{display:flex; gap:11px; align-items:flex-start; padding:11px 0; border-bottom:1px dashed var(--line);} .gap:last-child{border:none;}
  .gap .ic{flex:none; width:32px; height:32px; border-radius:50%; background:#f7e9e4; color:var(--warn); display:flex; align-items:center; justify-content:center; font-weight:900;}
  .gap.okrow .ic{background:#e7f3ef; color:var(--ok);}
  .ask{font-size:18px; padding:10px 0; border-bottom:1px dashed var(--line);} .ask:last-child{border:none;}
  .ask::before{content:"？"; color:var(--brand); font-weight:900; margin-right:10px;}

  .center{text-align:center;} .big-emoji{font-size:60px; margin:8px 0;}
  .name-input{width:100%; font-family:inherit; font-size:19px; padding:15px; border:2.5px solid var(--line); border-radius:13px; margin-top:10px;}
  .hint{font-size:14px; color:var(--muted); margin-top:8px;}
  .toolbar{display:grid; gap:10px; margin-top:16px;}
  .toolbar .btn{flex:none; width:100%;}
  #sumText{display:none; width:100%; height:180px; margin-top:12px; font-family:inherit; font-size:15px; padding:14px; border:2px solid var(--line); border-radius:12px; background:#fff;}
  .toast{position:fixed; left:50%; bottom:90px; transform:translateX(-50%); background:var(--ink); color:#fff;
    padding:12px 22px; border-radius:999px; font-size:16px; opacity:0; transition:.25s; pointer-events:none; z-index:9; max-width:90%; text-align:center;}
  .toast.show{opacity:1;}

  /* 大螢幕 / 電視 */
  @media (min-width:1100px){
    body{font-size:26px;} header{padding:18px 40px;} .brand b{font-size:28px;} .brand span{font-size:18px;}
    .rbtn{font-size:18px; padding:10px 18px;} .lang button{font-size:20px; padding:10px 22px;}
    .progress{padding:14px 40px 0;} main{padding:30px 40px 150px;} .stage{max-width:1000px;}
    h1{font-size:42px;} p.lead{font-size:27px;} .eyebrow{font-size:20px;}
    .q{font-size:30px;} .opt{font-size:28px; min-height:86px; padding:22px 26px; gap:20px;}
    .num{width:50px; height:50px; font-size:26px; border-radius:12px;}
    .four .ocard .h{font-size:26px;} .four .ocard p{font-size:20px;} .four .ocard .ico{width:50px; height:50px; font-size:26px;}
    .note{font-size:23px;} .chk{font-size:25px;} .feedback{font-size:24px;}
    .tchip{font-size:19px; min-width:120px;} .tchip .tn{width:36px; height:36px; font-size:22px;}
    .stepbig{font-size:30px;} .capd-svg{max-width:620px;} .capd-instr{font-size:30px;} .capd-do{font-size:25px;} .capd-btn{font-size:30px; padding:24px;}
    .nav{padding:18px 40px;} .keyhint{display:block;} .btn{font-size:27px; padding:20px 40px;} .btn.primary{flex:none;}
    .toolbar{display:flex; flex-wrap:wrap;} .toolbar .btn{width:auto;}
    .summary .head b{font-size:30px;} .srow{padding:24px 30px;}
  }
  @media (min-width:720px){ .four{grid-template-columns:1fr 1fr;} }
  @media (max-width:520px){ .four{grid-template-columns:1fr;} }

  /* 矮螢幕（手機橫式） */
  @media (max-height:560px) and (max-width:1099px){
    header{padding:8px 16px;} .brand b{font-size:16px;} .brand span{display:none;}
    .rbtn,.lang button{padding:5px 11px; font-size:13px;}
    .progress{padding:7px 16px 0;} .bar{height:8px;}
    main{padding:12px 16px 84px;} h1{font-size:21px; margin-top:4px;} p.lead{font-size:16px; margin:6px 0;}
    .video{height:48vh; aspect-ratio:auto;} .capd-svg{max-width:320px;}
    .nav{padding:8px 16px;} .btn{padding:11px 18px; font-size:17px;} .btn.ghost{padding:11px 13px; font-size:15px;}
    .card{padding:14px;} .q{font-size:18px;} .opt{min-height:54px; padding:12px 14px; font-size:17px;}
  }
  @media print{header,.progress,.nav,.toolbar,.lang,.toast{display:none!important;} main{padding:0;} body{background:#fff;}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>

<header>
  <div class="brand"><b>嘉義基督教醫院　腎臟內科</b><span>腹膜透析（洗肚子）・認識與體驗</span></div>
  <div class="ctrls">
    <button id="readBtn" class="rbtn focusable on" onclick="toggleRead()">🔊 朗讀：開</button>
    <div class="lang">
      <button id="langGuo" class="on focusable" onclick="setLang('guo')">國語</button>
      <button id="langTai" class="focusable" onclick="setLang('tai')">台語</button>
    </div>
  </div>
</header>

<div class="progress"><div class="bar"><i id="barFill"></i></div><div class="ptext" id="barText">準備開始</div></div>
<main><div class="stage" id="stage"></div></main>
<div class="toast" id="toast"></div>

<div class="nav">
  <div class="keyhint">遙控器：<kbd>▲</kbd><kbd>▼</kbd> 移動　<kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> 直接選　<kbd>OK</kbd> 確認　<kbd>▶</kbd> 下一步　<kbd>◀</kbd> 上一步</div>
  <button class="btn ghost" id="backBtn" onclick="prev()">◀ 上一步</button>
  <button class="btn primary" id="nextBtn" onclick="next()">開始 ▶</button>
</div>

<script>
/* ════════════ 影片設定：嘉基只改這裡 ════════════ */
const VIDEOS = {
  pd_intro: { label:"腹膜透析（洗肚子）：怎麼運作", vimeo:"378770445", vimeo_tw:"" },
  pd_life:  { label:"腹膜透析病友的一天",        vimeo:"", vimeo_tw:"" },
};
/* ═══════════════════════════════════════════════ */

let lang='guo';
const state={ name:"", answers:{}, concerns:[], asks:[], leaning:null, capdStep:0, _picked:undefined, _focus:'first' };

function setLang(l){ lang=l;
  document.getElementById('langGuo').classList.toggle('on',l==='guo');
  document.getElementById('langTai').classList.toggle('on',l==='tai');
  if('speechSynthesis' in window) window.speechSynthesis.cancel(); render(); }

/* ── CAPD 五步驟（無菌→接管→引流→注入→留置） ── */
const CAPD=[
  { short:'洗手無菌', t:'第一步：洗手與無菌準備',
    d:'戴上口罩、用肥皂把手洗乾淨並擦乾。準備乾淨的桌面，檢查藥水袋是否清澈、沒有破損或漏液。',
    do:'請依照護理師示範，戴口罩、洗手。', svg:svgClean() },
  { short:'接管', t:'第二步：接管',
    d:'把透析液的管路接頭，和你腹部導管的接頭小心接在一起。全程不要用手碰到接口，保持無菌。',
    do:'請拿起體驗圍裙上的導管，試著把管路接上。', svg:svgConnect() },
  { short:'引流', t:'第三步：引流（先把舊的放出）',
    d:'打開開關，讓肚子裡停留過的舊透析液，先流到下方的引流袋，直到流乾淨。',
    do:'把空袋放低，看著練習藥水往下流出。', svg:svgDrain() },
  { short:'注入', t:'第四步：注入（再灌入新的）',
    d:'把新的透析液袋掛高，打開開關，讓乾淨的藥水緩緩流進腹腔。',
    do:'把藥水袋掛高，看著藥水緩緩流入。', svg:svgInfuse() },
  { short:'留置', t:'第五步：留置與分離',
    d:'關上開關、把管路分開並蓋好。藥水會留在腹腔停留幾個小時，這段時間你可以正常生活、做自己的事。',
    do:'關開關、蓋好接頭。體驗完成！', svg:svgDwell() },
];

const steps=[
{ id:'welcome', type:'welcome' },

{ id:'options', type:'four', eyebrow:'你的選擇', title:'腎臟到末期，有四種治療可以選',
  lead:'你的腎臟功能已經到了末期（前面已經認識過慢性腎臟病）。接下來需要選一種方式來「代替」腎臟的工作。常見有以下四種：' },

{ id:'options_q', type:'quiz', eyebrow:'小確認', q:'下列哪一種治療，是「在家自己做」的？',
  options:[{t:'腹膜透析（洗肚子）',correct:true},{t:'血液透析（洗血）',correct:false},{t:'腎臟移植',correct:false}],
  good:'對。腹膜透析（洗肚子）多在家中或工作場所自己操作，時間較彈性。今天我們就來認識它。',
  tip:'腹膜透析（洗肚子）多在家自己做；血液透析多到醫院、移植要等配對。今天先深入認識腹膜透析。', key:'腹膜透析的特色' },

{ id:'pd_intro', type:'video', video:'pd_intro', eyebrow:'認識腹膜透析', title:'腹膜透析（洗肚子）：怎麼運作',
  lead:'腹膜透析是利用你自己肚子裡的「腹膜」當作過濾膜：把透析液灌進腹腔停留一段時間，廢物和水分滲過來，再把液體放掉、換新的。' },

{ id:'pd_q', type:'quiz', eyebrow:'小確認', q:'腹膜透析（洗肚子）是用身體的哪個部位來過濾廢物？',
  options:[{t:'肚子裡的腹膜',correct:true},{t:'手臂的血管',correct:false},{t:'腎臟本身',correct:false}],
  good:'對。腹膜透析用自己的腹膜當濾膜，透過換液把廢物帶走。',

function capdNext(){ if(state.capdStep<CAPD.length-1){ state.capdStep++; state._focus='first'; render(); } else { state._focus='first'; next(); } }

function answer(id,x,c){ state.answers[id]=!!c; state._picked=x; state._focus='next'; render(); }
function toggleConcern(t,x){ const a=state.concerns; a.includes(t)?a.splice(a.indexOf(t),1):a.push(t); state._focus='item'+x; render(); }
function toggleAsk(t,x){ const a=state.asks; a.includes(t)?a.splice(a.indexOf(t),1):a.push(t); state._focus='item'+x; render(); }
function setLean(v){ state.leaning=v; state._focus='next'; render(); }

function updateNext(){ const s=steps[i],btn=document.getElementById('nextBtn'); btn.disabled=false;
  btn.textContent=i===0?'開始 ▶':(steps[i+1]&&steps[i+1].type==='summary'?'完成並產生摘要 ▶':'下一步 ▶');
  if(s.type==='quiz'&&state.answers[s.id]===undefined){btn.disabled=true; btn.textContent='請先作答';}
  if(s.type==='leaning'&&!state.leaning){btn.disabled=true; btn.textContent='請先選一個';}
  if(s.type==='capd'){ btn.style.display='none'; document.getElementById('backBtn').textContent='◀ 上一步'; }
  else if(s.type==='summary'){btn.style.display='none'; document.getElementById('backBtn').textContent='◀ 重看內容';}
  else{btn.style.display='inline-block'; document.getElementById('backBtn').textContent='◀ 上一步';}
}
function next(){ if(i<steps.length-1){state._picked=undefined; state._focus='first'; i++; render();} }
function prev(){
  if(steps[i].type==='capd'&&state.capdStep>0){ state.capdStep--; state._focus='first'; render(); return; }
  if(i>0){state._picked=undefined; state._focus='first'; if(steps[i].type==='capd')state.capdStep=0; i--; render();}
}

/* 遙控器/鍵盤焦點 */
let focusables=[], kf=0;
function collectFocus(){ const stage=document.getElementById('stage');
  focusables=[...stage.querySelectorAll('.focusable')];
  const nb=document.getElementById('nextBtn'),bb=document.getElementById('backBtn');
  if(nb.style.display!=='none'&&!nb.disabled)focusables.push(nb);
  if(bb.style.visibility!=='hidden')focusables.push(bb);
  let t=0;
  if(state._focus==='next'){const idx=focusables.indexOf(document.getElementById('nextBtn')); t=idx>=0?idx:0;}
  else if(typeof state._focus==='string'&&state._focus.startsWith('item')) t=Math.min(parseInt(state._focus.slice(4)),focusables.length-1);
  kf=Math.max(0,Math.min(t,focusables.length-1));
}
function applyFocus(){ focusables.forEach(el=>el.classList.remove('kfocus'));
  const el=focusables[kf]; if(el){el.classList.add('kfocus'); if(el.tagName!=='INPUT')el.focus({preventScroll:false});} }
function moveFocus(d){ if(!focusables.length)return; kf=(kf+d+focusables.length)%focusables.length; applyFocus(); }
document.addEventListener('keydown',e=>{ const k=e.key;
  if(k==='ArrowDown'){e.preventDefault();moveFocus(1);}
  else if(k==='ArrowUp'){e.preventDefault();moveFocus(-1);}
  else if(k==='ArrowRight'||k==='PageDown'){ e.preventDefault();
    if(steps[i].type==='capd'){ capdNext(); return; }
    const b=document.getElementById('nextBtn'); if(b.style.display!=='none'&&!b.disabled)next(); }
  else if(k==='ArrowLeft'||k==='PageUp'||k==='Backspace'){e.preventDefault();prev();}
  else if(k==='Enter'||k===' '){const el=focusables[kf]; if(el&&el.tagName!=='INPUT'){e.preventDefault();el.click();}}
  else if(/^[1-9]$/.test(k)){const items=[...document.getElementById('stage').querySelectorAll('.opt,.chk')]; const n=parseInt(k)-1; if(items[n]){e.preventDefault();items[n].click();}}
});

/* 語音朗讀 */
let autoRead=true, voices=[];
function loadVoices(){ try{ voices=window.speechSynthesis.getVoices()||[]; }catch(e){ voices=[]; } }
if('speechSynthesis' in window){ loadVoices(); window.speechSynthesis.onvoiceschanged=loadVoices; }
function pickVoice(){
  const L=x=>(x.lang||'').toLowerCase(), N=x=>(x.name||'');
  if(lang==='tai'){
    for(const p of ['nan','zh-tw-hant-nan','hak']){ const v=voices.find(x=>L(x).startsWith(p)); if(v)return v; }
    return null;
  }
  // 國語：指定優先台灣腔的「美佳」；其次高品質版，避開卡通/表情音
  const score=x=>{
    const n=N(x), l=L(x); let s;
    if(l.startsWith('zh-tw')) s=100;
    else if(l.startsWith('zh-hk')) s=40;
    else if(/^zh|^cmn/.test(l) && !l.startsWith('zh-cn') && !/大陸|大陆|china/i.test(n)) s=20;
    else if(/^zh|^cmn/.test(l)) s=5;
    else return -1;
    if(/美佳|mei.?jia/i.test(n)) s+=40;
    if(/enhanced|premium|進階|siri|neural/i.test(n)) s+=30;
    if(/google/i.test(n)) s+=15;
    if(/grandma|grandpa|rocko|boing|bahh|bells|bubbles|jester|organ|superstar|trinoids|whisper|wobble|zarvox|albert|junior|fred|ralph|cellos|pipe|deranged|hysterical|news|eddy|flo|reed/i.test(n)) s-=50;
    return s;
  };
  let best=null, bestS=0;
  for(const v of voices){ const s=score(v); if(s>bestS){ bestS=s; best=v; } }
  return best;
}
function stepSpeech(s){ if(!s)s=steps[i];
  if(s.type==='welcome') return '歡迎。認識腹膜透析，並親手體驗一次。';
  if(s.type==='four') return s.title+'。'+s.lead+'腹膜透析、血液透析、腎臟移植、保守安寧照護。';
  if(s.type==='quiz') return s.q+'。'+s.options.map((o,x)=>`第${x+1}，${o.t}`).join('。')+'。';
  if(s.type==='capd'){ const st=CAPD[state.capdStep]; return st.t+'。'+st.d; }
  if(s.type==='summary') return '已經完成，請把摘要拿給護理師。';
  if(s.title) return s.title+'。'+(s.lead||'');
  return ''; }
function speak(text){ if(!('speechSynthesis' in window)||!text)return;
  window.speechSynthesis.cancel();
  let v=pickVoice(), fb=false;
  if(!v&&lang==='tai'){ const zh=voices.find(x=>(x.lang||'').toLowerCase().startsWith('zh')); if(zh){v=zh; fb=true;} }
  const u=new SpeechSynthesisUtterance(text); if(v){u.voice=v; u.lang=v.lang;} else u.lang='zh-TW';
  u.rate=0.9; u.pitch=1; window.speechSynthesis.speak(u);
  if(fb&&!state._twWarned){ state._twWarned=true; toast('此裝置無台語語音，暫以國語朗讀；台語建議用院方錄音'); } }
function speakScreen(){ speak(stepSpeech(steps[i])); }
function maybeSpeak(s){ if(autoRead) speak(stepSpeech(s)); }
function toggleRead(){ autoRead=!autoRead; const b=document.getElementById('readBtn');
  b.textContent='🔊 朗讀：'+(autoRead?'開':'關'); b.classList.toggle('on',autoRead);
  if(autoRead) speakScreen(); else if('speechSynthesis' in window) window.speechSynthesis.cancel(); }

function leanText(){ return ({pd:'體驗後想選／想試 腹膜透析（洗肚子）',more:'對腹膜透析有興趣、想多了解',other:'想了解其他治療'})[state.leaning]||'未填'; }
function summaryHTML(){
  const wrong=steps.filter(s=>s.type==='quiz'&&state.answers[s.id]===false).map(s=>s.key);
  const okk=steps.filter(s=>s.type==='quiz'&&state.answers[s.id]===true).map(s=>s.key);
  const cls=({pd:'pd',more:'more',other:'other'})[state.leaning]||'more';
  const done = state.capdStep>=CAPD.length-1;
  const n=new Date(), ts=`${n.getMonth()+1}/${n.getDate()} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  return `<div class="summary"><div class="head"><b>護理師確認單　給最後 10 分鐘的對話</b>
      <span>${state.name?('病人：'+state.name+'　'):''}完成時間：${ts}　語言：${lang==='guo'?'國語':'台語'}</span></div>
    <div class="srow"><div class="k">目前傾向</div><span class="lean ${cls}">${leanText()}</span></div>
    <div class="srow"><div class="k">腹膜透析換液體驗</div>${done?'<span class="pill">已完成五步驟體驗</span>':'<span class="hint">未完成體驗（可陪同再做一次）</span>'}</div>
    <div class="srow"><div class="k">需要補強的觀念（優先談這幾點）</div>${wrong.length?wrong.map(w=>`<div class="gap"><div class="ic">!</div><div><b>${w}</b> — 病人理解尚不清楚，建議重點再確認</div></div>`).join(''):'<div class="gap okrow"><div class="ic">✓</div><div>基本觀念皆答對，可直接進入決策對話</div></div>'}${okk.length?`<div style="margin-top:10px" class="hint">已理解：${okk.join('、')}</div>`:''}</div>
    <div class="srow"><div class="k">病人想多了解的擔心</div>${state.concerns.length?state.concerns.map(c=>`<span class="pill">${c}</span>`).join(''):'<span class="hint">無特別勾選</span>'}</div>
    <div class="srow"><div class="k">病人想問的問題</div>${state.asks.length?state.asks.map(a=>`<div class="ask">${a}</div>`).join(''):'<span class="hint">無特別勾選</span>'}</div></div>
  <div class="toolbar">
    <button class="btn primary focusable" onclick="copySummary()">📋 複製摘要文字（傳給診間 LINE）</button>
    <button class="btn ghost focusable" onclick="window.print()">🖨 列印 / 存檔</button>
    <button class="btn ghost focusable" onclick="restart()">換下一位（清空重來）</button>
  </div>
  <textarea id="sumText" readonly></textarea>
  <p class="hint">※ 資料僅存在本次畫面，重新整理或換人即清除。摘要不含身分證等資料，僅作為和護理師討論用。</p>`;
}
function buildSummaryText(){
  const wrong=steps.filter(s=>s.type==='quiz'&&state.answers[s.id]===false).map(s=>s.key);
  return ['【腹膜透析（洗肚子）認識與體驗｜病人摘要】',
    state.name?('稱呼：'+state.name):null,
    '目前傾向：'+leanText(),
    '換液體驗：'+(state.capdStep>=CAPD.length-1?'已完成':'未完成'),
    '需補強觀念：'+(wrong.length?wrong.join('、'):'皆答對'),
    '想了解的擔心：'+(state.concerns.length?state.concerns.join('、'):'無'),
    '想問的問題：'+(state.asks.length?state.asks.join('、'):'無'),
  ].filter(Boolean).join('\n');
}
function copySummary(){ const ta=document.getElementById('sumText'); ta.style.display='block'; ta.value=buildSummaryText();
  ta.focus(); ta.select(); ta.setSelectionRange(0,99999);
  let done=false; try{ done=document.execCommand('copy'); }catch(e){}
  if(navigator.clipboard){ navigator.clipboard.writeText(ta.value).then(()=>toast('已複製，可貼到 LINE 傳給診間')).catch(()=>toast(done?'已複製':'請長按下方文字框複製')); }
  else toast(done?'已複製，可貼到 LINE':'請長按下方文字框複製'); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }
function restart(){ Object.assign(state,{name:"",answers:{},concerns:[],asks:[],leaning:null,capdStep:0,_picked:undefined,_focus:'first',_twWarned:false}); i=0; render(); }

/* 隨機打亂每題選項順序 */
function shuffle(a){ for(let j=a.length-1;j>0;j--){ const r=Math.floor(Math.random()*(j+1)); const t=a[j]; a[j]=a[r]; a[r]=t; } }
steps.forEach(s=>{ if(s.type==='quiz') shuffle(s.options); });

render();
</script>
</body>
</html>
